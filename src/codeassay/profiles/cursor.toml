# Cursor — https://cursor.com
# AI code editor by Anysphere. The Agent mode appends a "Made with Cursor"
# trailer to commits/PRs (on by default; toggle at Cursor Settings > Agent >
# Attribution). Verified via cursor.com/help/integrations/git (April 2026).
# The original placeholder patterns "cursor-agent@cursor.com",
# "@cursor.com", and "Generated by Cursor" were UNVERIFIED — official docs
# show "Made with Cursor" as the trailer text, not "Generated by Cursor".
# No dedicated bot author email is documented; cursor-agent@cursor.com is
# TENTATIVE — field verification pending: email domain not confirmed from
# official sources.

[[detect.message]]
pattern = 'Made with Cursor'
tool = "cursor"
confidence = "high"

[[detect.author]]
pattern = 'cursor-agent@cursor\.'
tool = "cursor"
confidence = "medium"

[[detect.branch]]
pattern = '^cursor/'
tool = "cursor"
confidence = "medium"
